name: Dungeon Crawler CI

on:
  push:
    paths:
      - 'examples/dungeon_crawler/**'
  pull_request:
    paths:
      - 'examples/dungeon_crawler/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: wasm32-unknown-unknown
        override: true
        components: rustfmt, clippy
    
    - name: Install Stellar CLI
      run: |
        curl -L https://github.com/stellar/stellar-cli/releases/download/v21.0.0/stellar-cli-21.0.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
        sudo mv stellar /usr/local/bin/
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: examples/dungeon_crawler/target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('examples/dungeon_crawler/Cargo.lock') }}
    
    - name: Check formatting
      run: |
        cd examples/dungeon_crawler
        cargo fmt --all -- --check
    
    - name: Run clippy
      run: |
        cd examples/dungeon_crawler
        cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Run tests
      run: |
        cd examples/dungeon_crawler
        cargo test
    
    - name: Build contract
      run: |
        cd examples/dungeon_crawler
        cargo build --target wasm32-unknown-unknown --release
    
    - name: Build with Stellar CLI
      run: |
        cd examples/dungeon_crawler
        stellar contract build
    
    - name: Verify WASM output
      run: |
        cd examples/dungeon_crawler
        ls -la target/wasm32-unknown-unknown/release/
        file target/wasm32-unknown-unknown/release/dungeon_crawler.wasm