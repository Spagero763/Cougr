name: Proof of Hunt Example

on:
  push:
name: Proof of Hunt CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'examples/proof_of_hunt/**'
      - '.github/workflows/proof_of_hunt.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'examples/proof_of_hunt/**'
      - '.github/workflows/proof_of_hunt.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli || true
      - name: Install stellar-zk
        run: cargo install --locked stellar-zk || true
      - name: Format
        run: cargo fmt --check
        working-directory: examples/proof_of_hunt
      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: examples/proof_of_hunt
      - name: Test
        run: cargo test
        working-directory: examples/proof_of_hunt
      - name: Build
        run: soroban contract build
env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env

      - name: Install Rust target for Soroban
        run: |
          source $HOME/.cargo/env
          rustup target add wasm32v1-none

      - name: Install Stellar CLI with Homebrew
        run: |
          brew update
          brew install stellar-cli
          stellar --version

      - name: cargo fmt --check
        run: |
          source $HOME/.cargo/env
          cargo fmt --check
        working-directory: examples/proof_of_hunt

      - name: cargo clippy (deny warnings)
        run: |
          source $HOME/.cargo/env
          cargo clippy --all-targets --all-features -- -D warnings
        working-directory: examples/proof_of_hunt

      - name: cargo test
        run: |
          source $HOME/.cargo/env
          cargo test
        working-directory: examples/proof_of_hunt

      - name: stellar contract build
        run: |
          source $HOME/.cargo/env
          stellar contract build
        working-directory: examples/proof_of_hunt
